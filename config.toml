[daemon]
bind_host = "127.0.0.1"
port = 49322
data_dir = "~/.local/share/heimdall"
# Scheduled task nudges are disabled by default. When enabled, the daemon records durable
# Task_Nudged/Task_Nudge_Failed events and applies cooldown/restart grace to avoid spam.
# nudge_enabled = false
# nudge_interval_seconds = 60
# nudge_ready_after_seconds = 300
# nudge_review_after_seconds = 300
# nudge_need_improvements_after_seconds = 300
# nudge_working_stale_after_seconds = 900
# nudge_cooldown_seconds = 300
# nudge_restart_grace_seconds = 60
# nudge_send_escape_prefix = false

[wrapper]
daemon_url = "http://127.0.0.1:49322"
credentials_path = "~/.local/share/heimdall/wrapper-credentials.json"
agent_name = "pi"
default_agent = "pi"
display_name = "{instance}"
requested_access_mode = "main"
command = ["pi"]
tmux_session = "ham-agents"
tmux_window_prefix = "agent"
# Legacy/source-cwd behavior: used when agent_run_dir is empty.
working_dir = "."
# Optional managed runtime cwd root. When set, wrappers run agents in
# <agent_run_dir>/<project>/<agent-instance-id> with safe path slugging.
# agent_run_dir = "~/.local/share/heimdall/agent-runs"
project = "default"
# Active approved memory templates to inject into new agent starter prompts. Entries may match template memory_id, title, or scope.
memory_templates = []
# Optional per-provider managed run-dir/bootstrap controls.
# agent_run_dir = "~/.local/share/heimdall/agent-runs"
# project = "default"
# run_dir = "" # exact cwd override; bypasses <agent_run_dir>/<project>/<agent> layout
# bootstrap_enabled = false
# bootstrap_profile = "pi" # pi|claude|codex or custom profile name
# bootstrap_files = ["AGENTS.md"] # default: CLAUDE.md for claude, AGENTS.md otherwise
# bootstrap_sections = ["identity", "guidance", "project", "memory"] # omit to include all

# Per-agent-command launch customization. The wrapper selects this section by
# wrapper.command[0] ("pi" here), or by stripping "-agent" from the agent class
# when wrapper.command is empty.
[wrapper.agent-cmd.pi]
command = ["pi"]
bootstrap_profile = "pi"
yolo_flags = []
# pi accepts the starter prompt as a positional arg:
#   pi "prompt"
prompt_flags = []
starter_prompt = "You are {display_name}. Your internal agent instance id is {instance}. Use ./bin/ham-ctl with token {token}. Read inbox with: ./bin/ham-ctl --config ./config.toml inbox --token {token}. Send with: ./bin/ham-ctl --config ./config.toml send --token {token} --to <agent_instance_id> --body <message>. User chat notifications are separate from agent inbox: when you see N User Chat Messages from <user_id>, read them with ./bin/ham-ctl --config ./config.toml chat fetch-user --token {token} --user-id <user_id>, and reply with ./bin/ham-ctl --config ./config.toml chat send-to-user --token {token} --user-id <user_id> --body <message>. Use Heimdall AI Manager tasks for task management: track every piece of work you do with a task, keep task status current, and follow task status best practices. Task CLI: claim work with ./bin/ham-ctl --config ./config.toml tasks next --token {token}; if a reviewer/verifier is assigned, do not claim another task until your current task is validated. If create/status returns error=dependency or error=assignee_active_task with blocking_task_ids, work/await the blocking task or move the blocked task to planned/blocked. Inspect with ./bin/ham-ctl --config ./config.toml tasks show --token {token} --task-id <task_id>; log progress with ./bin/ham-ctl --config ./config.toml tasks comment --token {token} --task-id <task_id> --body <note>; update status with ./bin/ham-ctl --config ./config.toml tasks status --token {token} --task-id <task_id> --status working|blocked|review|done --body <summary>; review with ./bin/ham-ctl --config ./config.toml tasks review --token {token} --task-id <task_id> --result good|bad|need_improvements --comment <comment>. To create work for another agent, run ./bin/ham-ctl --config ./config.toml tasks create --token {token} --title <title> --description <description> --assignee <agent_instance_id> --coordinator {instance} --status ready. Do not invent a task_id and do not rely on TASK_ID or other environment variables; task_id is always generated by the daemon. Normal root tasks also auto-create a task chain, so read both task_id and chain_id from the create response. Use the returned task_id for participant/comment/status commands, and use returned chain_id with --chain-id for follow-up/subtask creation; use --standalone only for explicit tiny one-off tasks. Add yourself in the correct role if needed with ./bin/ham-ctl --config ./config.toml tasks participant --token {token} --task-id <returned_task_id> --agent-instance-id {instance} --role coordinator|reviewer|verifier."

[wrapper.agent-cmd.claude]
command = ["claude"]
bootstrap_profile = "claude"
# Claude yolo/non-interactive permission bypass:
#   claude --dangerously-skip-permissions "prompt"
yolo_flags = ["--dangerously-skip-permissions"]
prompt_flags = []
starter_prompt = "You are {display_name}. Your internal agent instance id is {instance}. Use ./bin/ham-ctl with token {token}. Read inbox with: ./bin/ham-ctl --config ./config.toml inbox --token {token}. Send with: ./bin/ham-ctl --config ./config.toml send --token {token} --to <agent_instance_id> --body <message>. User chat notifications are separate from agent inbox: when you see N User Chat Messages from <user_id>, read them with ./bin/ham-ctl --config ./config.toml chat fetch-user --token {token} --user-id <user_id>, and reply with ./bin/ham-ctl --config ./config.toml chat send-to-user --token {token} --user-id <user_id> --body <message>. Use Heimdall AI Manager tasks for task management: track every piece of work you do with a task, keep task status current, and follow task status best practices. Task CLI: claim work with ./bin/ham-ctl --config ./config.toml tasks next --token {token}; if a reviewer/verifier is assigned, do not claim another task until your current task is validated. If create/status returns error=dependency or error=assignee_active_task with blocking_task_ids, work/await the blocking task or move the blocked task to planned/blocked. Inspect with ./bin/ham-ctl --config ./config.toml tasks show --token {token} --task-id <task_id>; log progress with ./bin/ham-ctl --config ./config.toml tasks comment --token {token} --task-id <task_id> --body <note>; update status with ./bin/ham-ctl --config ./config.toml tasks status --token {token} --task-id <task_id> --status working|blocked|review|done --body <summary>; review with ./bin/ham-ctl --config ./config.toml tasks review --token {token} --task-id <task_id> --result good|bad|need_improvements --comment <comment>. To create work for another agent, run ./bin/ham-ctl --config ./config.toml tasks create --token {token} --title <title> --description <description> --assignee <agent_instance_id> --coordinator {instance} --status ready. Do not invent a task_id and do not rely on TASK_ID or other environment variables; task_id is always generated by the daemon. Normal root tasks also auto-create a task chain, so read both task_id and chain_id from the create response. Use the returned task_id for participant/comment/status commands, and use returned chain_id with --chain-id for follow-up/subtask creation; use --standalone only for explicit tiny one-off tasks. Add yourself in the correct role if needed with ./bin/ham-ctl --config ./config.toml tasks participant --token {token} --task-id <returned_task_id> --agent-instance-id {instance} --role coordinator|reviewer|verifier."

# Startup detection is parsed per provider profile but remains disabled unless enabled.
# Later wrapper/daemon lifecycle tasks consume these patterns to classify startup state.
[wrapper.agent-cmd.claude.startup_detection]
enabled = false
startup_probe_seconds = 20
capture_interval_ms = 500
ready_patterns = ["> ", "How can I help"]
blocked_patterns = ["Do you trust the files in this folder", "Claude needs your permission", "press Enter to continue"]
probe_prompt = ""
probe_expect_echo = false
startup_unknown_is_blocked = false
sanitized_reason_mapping = ["trust=Claude directory trust prompt", "permission=Claude permission prompt"]

[wrapper.agent-cmd.codex]
command = ["codex"]
bootstrap_profile = "codex"
yolo_flags = []
prompt_flags = []
starter_prompt = "You are {display_name}. Your internal agent instance id is {instance}. Use ./bin/ham-ctl with token {token}. Read generated AGENTS.md first when present."

[ctl]
daemon_url = "http://127.0.0.1:49322"
