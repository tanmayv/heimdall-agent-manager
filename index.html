<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heimdall Screenshot Gallery</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08090b;
        --panel: #111318;
        --panel-2: #171a21;
        --border: rgba(255, 255, 255, 0.11);
        --muted: #8b93a7;
        --text: #f3f6ff;
        --accent: #38bdf8;
        --accent-2: #a78bfa;
        --good: #34d399;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 20% 0%, rgba(56,189,248,.18), transparent 32rem),
          radial-gradient(circle at 80% 10%, rgba(167,139,250,.14), transparent 30rem), var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      button, input { font: inherit; }
      .app { display: grid; grid-template-columns: 360px minmax(0, 1fr); min-height: 100vh; }
      aside {
        position: sticky; top: 0; height: 100vh; overflow: auto;
        border-right: 1px solid var(--border); background: rgba(8,9,11,.86); backdrop-filter: blur(18px);
        padding: 18px;
      }
      main { min-width: 0; padding: 22px; }
      .brand { display: flex; justify-content: space-between; align-items: start; gap: 14px; margin-bottom: 16px; }
      h1 { margin: 0; font-size: 20px; letter-spacing: -.03em; }
      .sub { margin-top: 6px; color: var(--muted); font-size: 13px; line-height: 1.45; }
      .pill { border: 1px solid var(--border); background: rgba(255,255,255,.06); color: var(--muted); border-radius: 999px; padding: 5px 9px; font-size: 12px; white-space: nowrap; }
      .toolbar { display: grid; gap: 10px; margin: 16px 0; }
      .search, .title-input {
        width: 100%; border: 1px solid var(--border); background: rgba(0,0,0,.28); color: var(--text);
        border-radius: 14px; padding: 11px 12px; outline: none;
      }
      .search:focus, .title-input:focus { border-color: rgba(56,189,248,.7); box-shadow: 0 0 0 3px rgba(56,189,248,.13); }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; }
      .btn {
        border: 1px solid var(--border); background: rgba(255,255,255,.07); color: var(--text);
        border-radius: 12px; padding: 9px 11px; cursor: pointer;
      }
      .btn:hover { background: rgba(255,255,255,.11); }
      .btn.primary { background: var(--accent); color: #001018; border-color: transparent; font-weight: 700; }
      .btn.good { background: rgba(52,211,153,.14); color: #b9f6d8; border-color: rgba(52,211,153,.25); }
      .shot-list { display: grid; gap: 8px; }
      .shot-row {
        width: 100%; text-align: left; border: 1px solid var(--border); border-radius: 14px; padding: 10px;
        background: rgba(255,255,255,.045); color: var(--text); cursor: pointer;
      }
      .shot-row:hover { border-color: rgba(56,189,248,.45); }
      .shot-row.active { border-color: var(--accent); background: rgba(56,189,248,.12); }
      .shot-row .num { color: var(--accent); font-variant-numeric: tabular-nums; font-size: 12px; }
      .shot-row .row-title { margin-top: 4px; font-size: 13px; line-height: 1.35; }
      .shot-row .file { margin-top: 4px; color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .viewer-top { display: flex; justify-content: space-between; gap: 18px; align-items: start; margin-bottom: 14px; }
      .viewer-title { min-width: 0; }
      .viewer-title h2 { margin: 0 0 9px; font-size: 28px; letter-spacing: -.04em; }
      .meta { color: var(--muted); font-size: 13px; }
      .title-card {
        border: 1px solid var(--border); background: rgba(17,19,24,.82); border-radius: 20px; padding: 14px;
        box-shadow: 0 20px 80px rgba(0,0,0,.25);
      }
      .title-card label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 7px; }
      .status { min-height: 20px; color: var(--muted); font-size: 12px; margin-top: 8px; }
      .status.saved { color: var(--good); }
      .screen-wrap { border: 1px solid var(--border); background: #050608; border-radius: 24px; padding: 12px; overflow: auto; }
      .screen { display: block; width: 100%; height: auto; border-radius: 16px; background: #000; }
      .help { margin-top: 14px; color: var(--muted); font-size: 12px; line-height: 1.55; }
      kbd { border: 1px solid var(--border); background: rgba(255,255,255,.08); border-radius: 6px; padding: 1px 5px; color: var(--text); }
      .hidden { display: none !important; }
      @media (max-width: 900px) { .app { grid-template-columns: 1fr; } aside { position: relative; height: auto; } .viewer-top { flex-direction: column; } }
    </style>
  </head>
  <body>
    <div class="app">
      <aside>
        <div class="brand">
          <div>
            <h1>Screenshot Gallery</h1>
            <div class="sub">Edit titles for each Heimdall UI screenshot. Use keyboard shortcuts to move quickly.</div>
          </div>
          <div class="pill"><span id="count"></span></div>
        </div>
        <div class="toolbar">
          <input id="search" class="search" placeholder="Filter screenshots…" autocomplete="off" />
          <div class="actions">
            <button id="prevBtn" class="btn" type="button">← Prev</button>
            <button id="nextBtn" class="btn" type="button">Next →</button>
            <button id="saveBtn" class="btn primary" type="button">Save title.json</button>
          </div>
        </div>
        <div id="shotList" class="shot-list"></div>
        <div class="help">
          Shortcuts: <kbd>←</kbd>/<kbd>→</kbd> previous/next, <kbd>T</kbd> edit title,
          <kbd>Enter</kbd> apply title, <kbd>⌘/Ctrl</kbd>+<kbd>S</kbd> save <code>title.json</code>.
          If your browser cannot write files directly, Save downloads a replacement <code>title.json</code>.
        </div>
      </aside>
      <main>
        <div class="viewer-top">
          <div class="viewer-title">
            <h2 id="displayTitle"></h2>
            <div id="displayMeta" class="meta"></div>
          </div>
          <div class="title-card">
            <label for="titleInput">Title for selected screenshot</label>
            <input id="titleInput" class="title-input" autocomplete="off" />
            <div class="actions" style="margin-top:10px">
              <button id="applyBtn" class="btn good" type="button">Apply title</button>
              <button id="resetBtn" class="btn" type="button">Reset from filename</button>
            </div>
            <div id="status" class="status"></div>
          </div>
        </div>
        <div class="screen-wrap">
          <img id="screen" class="screen" alt="Selected screenshot" />
        </div>
      </main>
    </div>

    <script>
      const screenshots = [
        "01-home-getting-started.png",
        "02-home-running-agents-lower-panel.png",
        "03-sidebar-collapsed.png",
        "04-sidebar-collapsed-popup.png",
        "05-new-conversation-page.png",
        "06-projects-page.png",
        "07-new-project-modal.png",
        "08-task-chains-page.png",
        "09-new-chain-modal.png",
        "10-agents-management-page.png",
        "11-create-agent-identity-modal.png",
        "12-agent-identity-page.png",
        "13-agent-identity-edit-modal.png",
        "14-agent-detail-page.png",
        "15-agent-detail-artifacts-panel.png",
        "16-agent-memory-editor-modal.png",
        "17-chain-view-main.png",
        "18-chain-task-detail-expanded.png",
        "19-task-agent-picker-modal.png",
        "20-chain-evidence-sidebar-diffs.png",
        "21-chain-artifacts-sidebar.png",
        "22-artifact-viewer-modal.png",
        "23-chain-editor-page.png",
        "24-memory-management-page.png",
        "25-memory-pending-inspect-scrolled.png",
        "26-attention-needs-review-page.png",
        "27-settings-daemons-page.png",
        "28-settings-providers-page.png",
        "29-settings-projects-page.png",
        "30-settings-agents-page.png",
        "31-settings-create-agent-modal.png",
        "32-settings-direct-chat-page.png",
        "34-guide-side-panel.png",
        "36-settings-defaults-templates-page.png",
        "37-settings-team-kinds-page.png",
        "38-settings-memory-browser-page.png"
];
      const embeddedTitles = {
        "01-home-getting-started.png": "Home Getting Started",
        "02-home-running-agents-lower-panel.png": "Home Running Agents Lower Panel",
        "03-sidebar-collapsed.png": "Sidebar Collapsed",
        "04-sidebar-collapsed-popup.png": "Sidebar Collapsed Popup",
        "05-new-conversation-page.png": "New Conversation Page",
        "06-projects-page.png": "Projects Page",
        "07-new-project-modal.png": "New Project Modal",
        "08-task-chains-page.png": "Task Chains Page",
        "09-new-chain-modal.png": "New Chain Modal",
        "10-agents-management-page.png": "Agents Management Page",
        "11-create-agent-identity-modal.png": "Create Agent Identity Modal",
        "12-agent-identity-page.png": "Agent Identity Page",
        "13-agent-identity-edit-modal.png": "Agent Identity Edit Modal",
        "14-agent-detail-page.png": "Agent Detail Page",
        "15-agent-detail-artifacts-panel.png": "Agent Detail Artifacts Panel",
        "16-agent-memory-editor-modal.png": "Agent Memory Editor Modal",
        "17-chain-view-main.png": "Chain View Main",
        "18-chain-task-detail-expanded.png": "Chain Task Detail Expanded",
        "19-task-agent-picker-modal.png": "Task Agent Picker Modal",
        "20-chain-evidence-sidebar-diffs.png": "Chain Evidence Sidebar Diffs",
        "21-chain-artifacts-sidebar.png": "Chain Artifacts Sidebar",
        "22-artifact-viewer-modal.png": "Artifact Viewer Modal",
        "23-chain-editor-page.png": "Chain Editor Page",
        "24-memory-management-page.png": "Memory Management Page",
        "25-memory-pending-inspect-scrolled.png": "Memory Pending Inspect Scrolled",
        "26-attention-needs-review-page.png": "Attention Needs Review Page",
        "27-settings-daemons-page.png": "Settings Daemons Page",
        "28-settings-providers-page.png": "Settings Providers Page",
        "29-settings-projects-page.png": "Settings Projects Page",
        "30-settings-agents-page.png": "Settings Agents Page",
        "31-settings-create-agent-modal.png": "Settings Create Agent Modal",
        "32-settings-direct-chat-page.png": "Settings Direct Chat Page",
        "34-guide-side-panel.png": "Guide Side Panel",
        "36-settings-defaults-templates-page.png": "Settings Defaults Templates Page",
        "37-settings-team-kinds-page.png": "Settings Team Kinds Page",
        "38-settings-memory-browser-page.png": "Settings Memory Browser Page"
};
      const titleJsonPath = 'screenshots/title.json';

      let titles = { ...embeddedTitles };
      let selected = 0;
      let fileHandle = null;
      const els = {
        count: document.getElementById('count'),
        search: document.getElementById('search'),
        shotList: document.getElementById('shotList'),
        prevBtn: document.getElementById('prevBtn'),
        nextBtn: document.getElementById('nextBtn'),
        saveBtn: document.getElementById('saveBtn'),
        displayTitle: document.getElementById('displayTitle'),
        displayMeta: document.getElementById('displayMeta'),
        titleInput: document.getElementById('titleInput'),
        applyBtn: document.getElementById('applyBtn'),
        resetBtn: document.getElementById('resetBtn'),
        status: document.getElementById('status'),
        screen: document.getElementById('screen'),
      };

      function fallbackTitle(file) {
        return file.replace(/\.png$/i, '').replace(/^\d+-/, '').replace(/-/g, ' ').replace(/\w/g, c => c.toUpperCase());
      }
      function currentFile() { return screenshots[selected]; }
      function visibleIndexes() {
        const q = els.search.value.trim().toLowerCase();
        return screenshots.map((file, index) => ({ file, index })).filter(item => !q || item.file.toLowerCase().includes(q) || (titles[item.file] || '').toLowerCase().includes(q)).map(item => item.index);
      }
      function setStatus(text, saved = false) {
        els.status.textContent = text || '';
        els.status.className = 'status' + (saved ? ' saved' : '');
      }
      function persistLocal() {
        localStorage.setItem('heimdall.screenshotTitles', JSON.stringify(titles));
      }
      function renderList() {
        const vis = visibleIndexes();
        els.count.textContent = `${vis.length} / ${screenshots.length}`;
        els.shotList.innerHTML = '';
        for (const index of vis) {
          const file = screenshots[index];
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'shot-row' + (index === selected ? ' active' : '');
          btn.innerHTML = `<div class="num">${String(index + 1).padStart(2, '0')}</div><div class="row-title">${escapeHtml(titles[file] || fallbackTitle(file))}</div><div class="file">${escapeHtml(file)}</div>`;
          btn.addEventListener('click', () => selectIndex(index));
          els.shotList.appendChild(btn);
        }
      }
      function renderViewer() {
        const file = currentFile();
        const title = titles[file] || fallbackTitle(file);
        els.displayTitle.textContent = title;
        els.displayMeta.textContent = `${selected + 1} of ${screenshots.length} · ${file}`;
        els.titleInput.value = title;
        els.screen.src = `screenshots/${file}`;
        els.screen.alt = title;
        renderList();
      }
      function selectIndex(index) {
        if (index < 0 || index >= screenshots.length) return;
        selected = index;
        renderViewer();
        document.querySelector('.shot-row.active')?.scrollIntoView({ block: 'nearest' });
      }
      function move(delta) {
        const vis = visibleIndexes();
        if (!vis.length) return;
        let pos = vis.indexOf(selected);
        if (pos === -1) pos = 0;
        else pos = (pos + delta + vis.length) % vis.length;
        selectIndex(vis[pos]);
      }
      function applyTitle() {
        const file = currentFile();
        titles[file] = els.titleInput.value.trim() || fallbackTitle(file);
        persistLocal();
        renderViewer();
        setStatus('Title applied locally. Save to write/download title.json.');
      }
      function resetTitle() {
        els.titleInput.value = fallbackTitle(currentFile());
        applyTitle();
      }
      async function loadTitleJson() {
        try {
          const res = await fetch(titleJsonPath, { cache: 'no-store' });
          if (res.ok) titles = { ...titles, ...(await res.json()) };
        } catch (_err) {}
        try {
          const local = JSON.parse(localStorage.getItem('heimdall.screenshotTitles') || '{}');
          titles = { ...titles, ...local };
        } catch (_err) {}
      }
      async function saveTitleJson() {
        applyTitle();
        const payload = JSON.stringify(Object.fromEntries(screenshots.map(file => [file, titles[file] || fallbackTitle(file)])), null, 2) + '\n';
        if ('showSaveFilePicker' in window) {
          try {
            fileHandle = fileHandle || await window.showSaveFilePicker({
              suggestedName: 'title.json',
              types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
            });
            const writable = await fileHandle.createWritable();
            await writable.write(payload);
            await writable.close();
            setStatus('Saved title.json.', true);
            return;
          } catch (err) {
            if (err?.name === 'AbortError') { setStatus('Save cancelled.'); return; }
          }
        }
        const blob = new Blob([payload], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'title.json';
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 0);
        setStatus('Downloaded title.json. Move it into screenshots/title.json to persist for the gallery.', true);
      }
      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
      }

      els.prevBtn.addEventListener('click', () => move(-1));
      els.nextBtn.addEventListener('click', () => move(1));
      els.applyBtn.addEventListener('click', applyTitle);
      els.resetBtn.addEventListener('click', resetTitle);
      els.saveBtn.addEventListener('click', saveTitleJson);
      els.search.addEventListener('input', renderList);
      els.titleInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') { event.preventDefault(); applyTitle(); els.titleInput.blur(); }
      });
      document.addEventListener('keydown', (event) => {
        const editing = document.activeElement === els.titleInput || document.activeElement === els.search;
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 's') { event.preventDefault(); saveTitleJson(); return; }
        if (editing) return;
        if (event.key === 'ArrowLeft') { event.preventDefault(); move(-1); }
        if (event.key === 'ArrowRight') { event.preventDefault(); move(1); }
        if (event.key.toLowerCase() === 't' || event.key.toLowerCase() === 'e') { event.preventDefault(); els.titleInput.focus(); els.titleInput.select(); }
      });

      loadTitleJson().then(renderViewer);
    </script>
  </body>
</html>
